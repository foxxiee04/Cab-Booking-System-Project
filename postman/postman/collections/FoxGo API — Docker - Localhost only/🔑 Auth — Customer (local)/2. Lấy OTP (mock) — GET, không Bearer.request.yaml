$kind: http-request
url: "{{docker_gateway_url}}/api/auth/dev/otp?phone={{customerPhone}}&purpose=register"
method: GET
queryParams:
  - key: phone
    value: "{{customerPhone}}"
    description: 0xxxxxxxxx hoặc +84…
  - key: purpose
    value: register
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.otp) {
        pm.collectionVariables.set('otp', res.otp);
        console.log('OTP saved:', res.otp);
      }
    language: text/javascript
order: 2000
