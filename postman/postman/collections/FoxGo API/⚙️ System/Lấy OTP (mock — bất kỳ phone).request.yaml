$kind: http-request
url: "{{base_url}}/api/auth/dev/otp?phone=0901234501&purpose=register"
method: GET
queryParams:
  - key: phone
    value: "0901234501"
  - key: purpose
    value: register
    description: register | reset
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.otp) {
        pm.collectionVariables.set('otp', res.otp);
        console.log('OTP saved:', res.otp);
      }
    language: text/javascript
order: 2000
