$kind: http-request
url: "{{base_url}}/api/reviews"
method: POST
headers:
  Authorization: Bearer {{customerToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "rideId": "{{rideId}}",
      "rating": 5,
      "comment": "Tài xế rất tốt, lái xe an toàn!"
    }
order: 8000
