$kind: http-request
url: "{{base_url}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "phone": "{{driverPhone}}",
      "password": "Test@123456"
    }
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.accessToken) {
        pm.collectionVariables.set('driverToken', res.accessToken);
        console.log('✅ driverToken saved');
      }
    language: text/javascript
order: 4000
