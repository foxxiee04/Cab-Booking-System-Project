<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1300" viewBox="0 0 1800 1300">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="none" stroke="#111" stroke-width="1.25"/>
    </marker>
    <style>
      .system { fill:#7ccbed; stroke:#111; stroke-width:1.6; }
      .group { fill:rgba(255,255,255,.10); stroke:#111; stroke-width:1; stroke-dasharray:6 6; opacity:.55; }
      .uc { fill:#7ccbed; stroke:#111; stroke-width:1.45; }
      .shared { fill:#b7e4f8; stroke:#111; stroke-width:1.55; }
      .actor-line { stroke:#111; stroke-width:1.5; fill:none; }
      .actor-head { fill:#7ccbed; stroke:#111; stroke-width:1.4; }
      .assoc { stroke:#111; stroke-width:1.35; fill:none; }
      .rel { stroke:#111; stroke-width:1.2; fill:none; stroke-dasharray:7 5; marker-end:url(#arrow); }
      .title { font-family:Arial, Helvetica, sans-serif; fill:#111; font-size:18px; font-weight:700; text-anchor:middle; }
      .group-title { font-family:Arial, Helvetica, sans-serif; fill:#111; font-size:15px; font-weight:700; text-anchor:start; opacity:.78; }
      .label { font-family:Arial, Helvetica, sans-serif; fill:#111; font-size:15px; text-anchor:middle; dominant-baseline:middle; }
      .small { font-family:Arial, Helvetica, sans-serif; fill:#111; font-size:13px; text-anchor:middle; dominant-baseline:middle; }
      .tiny { font-family:Arial, Helvetica, sans-serif; fill:#111; font-size:12px; text-anchor:middle; dominant-baseline:middle; }
      .note { font-family:Arial, Helvetica, sans-serif; fill:#111; font-size:12px; text-anchor:middle; dominant-baseline:middle; }
      .actor-text { font-family:Arial, Helvetica, sans-serif; fill:#111; font-size:15px; text-anchor:middle; }
    </style>
  </defs>

