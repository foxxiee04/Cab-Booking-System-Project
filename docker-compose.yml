services:
  # ============ Infrastructure ============
  postgres:
    image: postgres:16-alpine
    container_name: cab-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-cab_booking}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 12
      # Sau crash / fsync chậm (đặc biệt Docker Desktop Windows), recovery có thể > 1 phút.
      # start_period: không tính failure vào retries → tránh compose báo Error trong lúc PG đang recovery.
      start_period: 120s

  mongodb:
    image: mongo:7
    container_name: cab-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mongo}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongo}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config_data:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5


  redis:
    image: redis:7-alpine
    container_name: cab-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: cab-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
      RABBITMQ_PROMETHEUS_RETURN_PER_OBJECT_METRICS: "true"
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
      - "15692:15692"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============ Microservices ============
  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    image: cab-api-gateway:latest
    container_name: cab-api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-test-jwt-secret}
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      - AUTH_SERVICE_URL=http://auth-service:3001
      - AUTH_GRPC_ADDRESS=auth-service:50051
      - USER_SERVICE_URL=http://user-service:3007
      - USER_GRPC_ADDRESS=user-service:50052
      - BOOKING_SERVICE_URL=http://booking-service:3008
      - BOOKING_GRPC_ADDRESS=booking-service:50053
      - PRICING_SERVICE_URL=http://pricing-service:3009
      - PRICING_GRPC_ADDRESS=pricing-service:50057
      - AI_SERVICE_URL=${AI_SERVICE_URL:-http://ai-service:8000}
      - REVIEW_SERVICE_URL=http://review-service:3010
      - REVIEW_GRPC_ADDRESS=review-service:50059
      - RIDE_SERVICE_URL=http://ride-service:3002
      - RIDE_GRPC_ADDRESS=ride-service:50054
      - DRIVER_SERVICE_URL=http://driver-service:3003
      - DRIVER_GRPC_ADDRESS=driver-service:50055
      - PAYMENT_SERVICE_URL=http://payment-service:3004
      - PAYMENT_GRPC_ADDRESS=payment-service:50056
      - WALLET_SERVICE_URL=http://wallet-service:3006
      - NOTIFICATION_SERVICE_URL=http://notification-service:3005
      - NOTIFICATION_GRPC_ADDRESS=notification-service:50058
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-test-internal-token}
      - OTP_ENABLE_DEV_ENDPOINT=true
      - LOCATION_DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/location_db
      - MATCHING_MAX_ATTEMPTS=${MATCHING_MAX_ATTEMPTS:-3}
      - MATCHING_RETRY_DELAY_MS=${MATCHING_RETRY_DELAY_MS:-2500}
      - MATCHING_MAX_WAIT_MS=${MATCHING_MAX_WAIT_MS:-120000}
      - MATCHING_ROUNDS=${MATCHING_ROUNDS:-2:1:1.0,4:1:1.1,6:1:1.2}
      - MATCHING_SCORE_LOG_VERBOSE=${MATCHING_SCORE_LOG_VERBOSE:-false}
      - MATCHING_AI_ADJUSTMENT_ENABLED=${MATCHING_AI_ADJUSTMENT_ENABLED:-true}
      - MATCHING_AI_ADJUSTMENT_DELTA_MAX=${MATCHING_AI_ADJUSTMENT_DELTA_MAX:-0.08}
      - MATCHING_AI_TIMEOUT_MS=${MATCHING_AI_TIMEOUT_MS:-150}
      - MATCHING_PACCEPT_ENABLED=${MATCHING_PACCEPT_ENABLED:-true}
      - MATCHING_PACCEPT_CLAMP_MIN=${MATCHING_PACCEPT_CLAMP_MIN:-0.3}
      - MATCHING_PACCEPT_CLAMP_MAX=${MATCHING_PACCEPT_CLAMP_MAX:-1.2}
      - MATCHING_WAIT_PREDICTION_ENABLED=${MATCHING_WAIT_PREDICTION_ENABLED:-true}
      - MATCHING_WAIT_THRESHOLD_MINUTES=${MATCHING_WAIT_THRESHOLD_MINUTES:-8}
      - MATCHING_MAX_RADIUS_KM=${MATCHING_MAX_RADIUS_KM:-5}
      - CUSTOMER_NEARBY_DRIVER_MAX_RADIUS_KM=${CUSTOMER_NEARBY_DRIVER_MAX_RADIUS_KM:-3}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      booking-service:
        condition: service_started
      pricing-service:
        condition: service_started
      review-service:
        condition: service_started
      ride-service:
        condition: service_started
      driver-service:
        condition: service_started
      payment-service:
        condition: service_started
      wallet-service:
        condition: service_started
      notification-service:
        condition: service_started
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
    image: cab-auth-service:latest
    container_name: cab-auth-service
    env_file:
      - ./env/auth.env
    ports:
      - "3001:3001"
      - "50051:50051"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - GRPC_PORT=50051
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/auth_db?schema=public
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      - JWT_SECRET=${JWT_SECRET:-test-jwt-secret}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET:-test-refresh-secret}
      - JWT_EXPIRES_IN=15m
      - REFRESH_TOKEN_EXPIRES_IN=7d
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-test-internal-token}
      - REDIS_URL=redis://redis:6379
      - OTP_TTL_SECONDS=120
      - OTP_MAX_ATTEMPTS=5
      - OTP_RATE_MAX_PER_PHONE=3
      - OTP_RATE_PHONE_WINDOW=600
      - OTP_RATE_MAX_PER_IP=10
      - OTP_RATE_IP_WINDOW=60
      - OTP_SMS_MODE=mock
      - OTP_ENABLE_DEV_ENDPOINT=true
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  user-service:
    build:
      context: .
      dockerfile: ./services/user-service/Dockerfile
    image: cab-user-service:latest
    container_name: cab-user-service
    ports:
      - "3007:3007"
      - "50052:50052"
    environment:
      - NODE_ENV=development
      - PORT=3007
      - GRPC_PORT=50052
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/user_db?schema=public
      - JWT_SECRET=${JWT_SECRET:-test-jwt-secret}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ride-service:
    build:
      context: .
      dockerfile: ./services/ride-service/Dockerfile
    image: cab-ride-service:latest
    container_name: cab-ride-service
    ports:
      - "3002:3002"
      - "50054:50054"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - GRPC_PORT=50054
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ride_db?schema=public
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      - AUTH_SERVICE_URL=http://auth-service:3001
      - USER_SERVICE_URL=http://user-service:3007
      - PRICING_SERVICE_URL=http://pricing-service:3009
      - PRICING_GRPC_ADDRESS=pricing-service:50057
      - DRIVER_SERVICE_URL=http://driver-service:3003
      - DRIVER_GRPC_ADDRESS=driver-service:50055
      - PAYMENT_SERVICE_URL=http://payment-service:3004
      - WALLET_SERVICE_URL=http://wallet-service:3006
      - JWT_SECRET=${JWT_SECRET:-test-jwt-secret}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-test-internal-token}
      - RIDE_SEARCH_TIMEOUT_MS=${RIDE_SEARCH_TIMEOUT_MS:-120000}
      - RIDE_MAX_MATCHING_RETRIES=${RIDE_MAX_MATCHING_RETRIES:-3}
      - RIDE_SEARCH_RADIUS_KM=${RIDE_SEARCH_RADIUS_KM:-3}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      wallet-service:
        condition: service_started
    restart: unless-stopped

  driver-service:
    build:
      context: .
      dockerfile: ./services/driver-service/Dockerfile
    image: cab-driver-service:latest
    container_name: cab-driver-service
    ports:
      - "3003:3003"
      - "50055:50055"
    environment:
      - NODE_ENV=development
      - PORT=3003
      - GRPC_PORT=50055
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/driver_db?schema=public
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      - JWT_SECRET=${JWT_SECRET:-test-jwt-secret}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-test-internal-token}
      - RIDE_SERVICE_URL=http://ride-service:3002
      - PAYMENT_SERVICE_URL=http://payment-service:3004
      - WALLET_SERVICE_URL=http://wallet-service:3006
      - USER_SERVICE_URL=http://user-service:3007
      - AUTH_SERVICE_URL=http://auth-service:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: ./services/payment-service/Dockerfile
    image: cab-payment-service:latest
    container_name: cab-payment-service
    env_file:
      - ./env/payment.env
    ports:
      - "3004:3004"
      - "50056:50056"
    environment:
      - NODE_ENV=development
      - PORT=3004
      - GRPC_PORT=50056
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/payment_db?schema=public
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      - JWT_SECRET=${JWT_SECRET:-test-jwt-secret}
      - DRIVER_SERVICE_URL=http://driver-service:3003
      - WALLET_SERVICE_URL=http://wallet-service:3006
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-test-internal-token}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  wallet-service:
    build:
      context: ./services/wallet-service
      dockerfile: Dockerfile
    image: cab-wallet-service:latest
    container_name: cab-wallet-service
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=development
      - PORT=3006
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/wallet_db?schema=public
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      - JWT_SECRET=${JWT_SECRET:-test-jwt-secret}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-test-internal-token}
      - PAYMENT_SERVICE_URL=http://payment-service:3004
      - DEBT_LIMIT=-200000
      - WARNING_THRESHOLD=-100000
      - INITIAL_ACTIVATION_BALANCE=300000
      - MIN_WITHDRAWAL=50000
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: ./services/notification-service/Dockerfile
    image: cab-notification-service:latest
    container_name: cab-notification-service
    ports:
      - "3005:3005"
      - "50058:50058"
    environment:
      - NODE_ENV=development
      - PORT=3005
      - GRPC_PORT=50058
      - MONGODB_URI=mongodb://${MONGO_USER:-mongo}:${MONGO_PASSWORD:-mongo}@mongodb:27017/notification_db?authSource=admin
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      - JWT_SECRET=${JWT_SECRET:-test-jwt-secret}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  review-service:
    build:
      context: .
      dockerfile: ./services/review-service/Dockerfile
    image: cab-review-service:latest
    container_name: cab-review-service
    ports:
      - "3010:3010"
      - "50059:50059"
    environment:
      - NODE_ENV=development
      - PORT=3010
      - GRPC_PORT=50059
      - MONGODB_URI=mongodb://${MONGO_USER:-mongo}:${MONGO_PASSWORD:-mongo}@mongodb:27017/review_db?authSource=admin
      - JWT_SECRET=${JWT_SECRET:-test-jwt-secret}
      - DRIVER_SERVICE_URL=http://driver-service:3003
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-test-internal-token}
    depends_on:
      mongodb:
        condition: service_healthy
      driver-service:
        condition: service_started
    restart: unless-stopped


  booking-service:
    build:
      context: .
      dockerfile: ./services/booking-service/Dockerfile
    image: cab-booking-service:latest
    container_name: cab-booking-service
    ports:
      - "3008:3008"
      - "50053:50053"
    environment:
      - NODE_ENV=development
      - PORT=3008
      - GRPC_PORT=50053
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/booking_db?schema=public
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      - PRICING_SERVICE_URL=http://pricing-service:3009
      - PRICING_GRPC_ADDRESS=pricing-service:50057
      - RIDE_SERVICE_URL=http://ride-service:3002
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  pricing-service:
    build:
      context: .
      dockerfile: ./services/pricing-service/Dockerfile
    image: cab-pricing-service:latest
    container_name: cab-pricing-service
    ports:
      - "3009:3009"
      - "50057:50057"
    environment:
      - NODE_ENV=development
      - PORT=3009
      - GRPC_PORT=50057
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      - OSRM_BASE_URL=${OSRM_BASE_URL:-http://router.project-osrm.org}
      - AI_SERVICE_URL=${AI_SERVICE_URL:-http://ai-service:8000}
      - AI_SERVICE_TIMEOUT_MS=${AI_SERVICE_TIMEOUT_MS:-150}
      - AI_SURGE_MIN=${AI_SURGE_MIN:-1.0}
      - AI_SURGE_MAX=${AI_SURGE_MAX:-2.0}
      - AI_RADIUS_MIN_KM=${AI_RADIUS_MIN_KM:-2.0}
      - AI_RADIUS_MAX_KM=${AI_RADIUS_MAX_KM:-5.0}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ============ AI Service ============
  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    image: cab-ai-service:latest
    container_name: cab-ai-service
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=8000
      - MODEL_PATH=app/models/eta_price_model.joblib
      - ACCEPT_MODEL_PATH=app/models/accept_model.joblib
      - WAIT_MODEL_PATH=app/models/wait_model.joblib
      - MODEL_VERSION=${MODEL_VERSION:-eta-rf-v2}
      - FEATURE_VERSION=${FEATURE_VERSION:-features-v1}
      - SUGGESTED_RADIUS_MIN_KM=${SUGGESTED_RADIUS_MIN_KM:-2.0}
      - SUGGESTED_RADIUS_MAX_KM=${SUGGESTED_RADIUS_MAX_KM:-5.0}
      - SUGGESTED_SURGE_MIN=${SUGGESTED_SURGE_MIN:-1.0}
      - SUGGESTED_SURGE_MAX=${SUGGESTED_SURGE_MAX:-2.0}
      # RAG chatbot — set at least one LLM key for human-like answers
      # Priority order: Claude → Groq → Gemini → OpenAI → template fallback
      - RAG_LLM_PROVIDER=${RAG_LLM_PROVIDER:-auto}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - RAG_LLM_MODEL_CLAUDE=${RAG_LLM_MODEL_CLAUDE:-claude-haiku-4-5-20251001}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - RAG_LLM_MODEL=${RAG_LLM_MODEL:-llama-3.3-70b-versatile}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - RAG_LLM_MODEL_GEMINI=${RAG_LLM_MODEL_GEMINI:-gemini-2.5-flash}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - RAG_LLM_MODEL_OPENAI=${RAG_LLM_MODEL_OPENAI:-gpt-4o-mini}
      - RAG_LLM_TIMEOUT_S=${RAG_LLM_TIMEOUT_S:-20}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-bkai-foundation-models/vietnamese-bi-encoder}
      # Periodic maintenance (0 = off): RAG re-index from app/data/knowledge/*.txt
      - AI_AUTO_RELOAD_RAG_SEC=${AI_AUTO_RELOAD_RAG_SEC:-0}
      # ML retrain: heavy CPU; enable AI_AUTO_RETRAIN_ENABLED=true and interval > 0
      - AI_AUTO_RETRAIN_SEC=${AI_AUTO_RETRAIN_SEC:-0}
      - AI_AUTO_RETRAIN_ENABLED=${AI_AUTO_RETRAIN_ENABLED:-false}
      # Bearer secret for POST /api/internal/refresh (empty = route hidden as 404)
      - AI_INTERNAL_TOKEN=${AI_INTERNAL_TOKEN:-}
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; raise SystemExit(0 if urlopen('http://localhost:8000/api/health').status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - default

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: cab-prometheus
    profiles: ["monitoring"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api-gateway
      - ride-service
      - payment-service
      - pricing-service
      - rabbitmq
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.4
    container_name: cab-grafana
    profiles: ["monitoring"]
    ports:
      - "3006:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:3.1.1
    container_name: cab-loki
    profiles: ["monitoring"]
    ports:
      - "3100:3100"
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.1
    container_name: cab-promtail
    profiles: ["monitoring"]
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cab-cadvisor
    profiles: ["monitoring"]
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    privileged: true
    restart: unless-stopped


  # ============ Bootstrap runner (Không cần npm trên host) ============
  # Chạy: docker compose --profile tools run --rm bootstrap-runner
  # Hoặc: npm run docker:bootstrap
  # npm ci chỉ trong container + volume node_modules; cần .env và git repo mount tại đây.
  bootstrap-runner:
    profiles:
      - tools
    build:
      context: .
      dockerfile: Dockerfile.bootstrap
    image: cab-bootstrap-runner:latest
    network_mode: host
    environment:
      SWARM_SSH_KEY: /workspace/.secrets/swarm_key
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace:rw
      - cab_booking_bootstrap_nm:/workspace/node_modules
      # Prisma migrate cần SSH tới worker (git deploy đã có ~/.ssh/swarm_key trên Manager)
      - ${HOME}/.ssh/swarm_key:/workspace/.secrets/swarm_key:ro
    working_dir: /workspace


  # Giữ container chạy để dùng: docker exec -it cab-bootstrap-shell npm run system:bootstrap
  bootstrap-shell:
    profiles:
      - tools
    build:
      context: .
      dockerfile: Dockerfile.bootstrap
    image: cab-bootstrap-runner:latest
    container_name: cab-bootstrap-shell
    network_mode: host
    environment:
      SWARM_SSH_KEY: /workspace/.secrets/swarm_key
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace:rw
      - cab_booking_bootstrap_nm:/workspace/node_modules
      - ${HOME}/.ssh/swarm_key:/workspace/.secrets/swarm_key:ro
    working_dir: /workspace
    command: ["sleep", "infinity"]


  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: cab-node-exporter
    profiles: ["monitoring"]
    ports:
      - "9100:9100"
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    restart: unless-stopped


