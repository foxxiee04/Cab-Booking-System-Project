  postgres_data:
    name: cab-booking-postgres-data
    driver: local
  mongo_data:
    name: cab-booking-mongo-data
    driver: local
  mongo_config_data:
    name: cab-booking-mongo-config-data
    driver: local
  redis_data:
    name: cab-booking-redis-data
    driver: local
  rabbitmq_data:
    name: cab-booking-rabbitmq-data
