version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      RABBITMQ_PROMETHEUS_RETURN_PER_OBJECT_METRICS: "true"
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway
  api-gateway:
    image: ${DOCKERHUB_USERNAME}/cab-api-gateway:${IMAGE_TAG:-latest}
    container_name: cab-api-gateway
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: 3000
    depends_on:
      - postgres
      - redis
      - rabbitmq
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cab-network
    restart: unless-stopped

  # Auth Service
  auth-service:
    image: ${DOCKERHUB_USERNAME}/cab-auth-service:${IMAGE_TAG:-latest}
    container_name: cab-auth-service
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/auth_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: 24h
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cab-network
    restart: unless-stopped

  # User Service
  user-service:
    image: ${DOCKERHUB_USERNAME}/cab-user-service:${IMAGE_TAG:-latest}
    container_name: cab-user-service
    ports:
      - "3007:3007"
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: 3007
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/user_db
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cab-network
    restart: unless-stopped

  # Ride Service
  ride-service:
    image: ${DOCKERHUB_USERNAME}/cab-ride-service:${IMAGE_TAG:-latest}
    container_name: cab-ride-service
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/ride_db
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      PRICING_SERVICE_URL: http://pricing-service:3009
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cab-network
    restart: unless-stopped

  # Driver Service
  driver-service:
    image: ${DOCKERHUB_USERNAME}/cab-driver-service:${IMAGE_TAG:-latest}
    container_name: cab-driver-service
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/driver_db
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cab-network
    restart: unless-stopped

  # Payment Service
  payment-service:
    image: ${DOCKERHUB_USERNAME}/cab-payment-service:${IMAGE_TAG:-latest}
    container_name: cab-payment-service
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: 3004
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/payment_db
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cab-network
    restart: unless-stopped

  # Notification Service
  notification-service:
    image: ${DOCKERHUB_USERNAME}/cab-notification-service:${IMAGE_TAG:-latest}
    container_name: cab-notification-service
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: 3005
      MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/notification_db?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cab-network
    restart: unless-stopped

  # Review Service
  review-service:
    image: ${DOCKERHUB_USERNAME}/cab-review-service:${IMAGE_TAG:-latest}
    container_name: cab-review-service
    ports:
      - "3010:3010"
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: 3010
      MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/review_db?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cab-network
    restart: unless-stopped

  # Booking Service
  booking-service:
    image: ${DOCKERHUB_USERNAME}/cab-booking-service:${IMAGE_TAG:-latest}
    container_name: cab-booking-service
    ports:
      - "3008:3008"
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: 3008
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/booking_db
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      PRICING_SERVICE_URL: http://pricing-service:3009
      RIDE_SERVICE_URL: http://ride-service:3002
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cab-network
    restart: unless-stopped

  # Pricing Service
  pricing-service:
    image: ${DOCKERHUB_USERNAME}/cab-pricing-service:${IMAGE_TAG:-latest}
    container_name: cab-pricing-service
    ports:
      - "3009:3009"
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: 3009
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      OSRM_BASE_URL: ${OSRM_BASE_URL:-http://router.project-osrm.org}
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3009/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cab-network
    restart: unless-stopped

  # ============ AI Service (Production) ============
  ai-service:
    image: ${DOCKERHUB_USERNAME}/cab-ai-service:${IMAGE_TAG:-latest}
    container_name: cab-ai-service
    ports:
      - "8000:8000"
    environment:
      DEBUG: "False"
      HOST: 0.0.0.0
      PORT: 8000
      MODEL_PATH: app/models/eta_price_model.joblib
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cab-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: cab-prometheus
    profiles: ["monitoring"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api-gateway
      - ride-service
      - payment-service
      - pricing-service
      - rabbitmq
    networks:
      - cab-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.4
    container_name: cab-grafana
    profiles: ["monitoring"]
    ports:
      - "3006:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - cab-network
    restart: unless-stopped

  loki:
    image: grafana/loki:3.1.1
    container_name: cab-loki
    profiles: ["monitoring"]
    ports:
      - "3100:3100"
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - cab-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.1
    container_name: cab-promtail
    profiles: ["monitoring"]
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - cab-network
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cab-cadvisor
    profiles: ["monitoring"]
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    privileged: true
    networks:
      - cab-network
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: cab-node-exporter
    profiles: ["monitoring"]
    ports:
      - "9100:9100"
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    networks:
      - cab-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  mongo_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

networks:
  cab-network:
    driver: bridge
