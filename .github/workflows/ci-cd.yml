name: CI/CD - Docker Hub

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME || github.repository_owner }}

jobs:
  test-unit:
    name: Test - Unit
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      mongodb:
        image: mongo:7
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3.12-management-alpine
        options: >-
          --health-cmd "rabbitmq-diagnostics check_running"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5672:5672

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build shared helpers
        run: npm run build:shared

      - name: Run unit tests
        run: npm run test:unit
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          MONGODB_URI: mongodb://localhost:27017/test_db
          REDIS_URL: redis://localhost:6379
          RABBITMQ_URL: amqp://localhost:5672
          JWT_SECRET: test-jwt-secret
          REFRESH_TOKEN_SECRET: test-refresh-secret
          INTERNAL_SERVICE_TOKEN: test-internal-token
          AI_SERVICE_URL: http://127.0.0.1:8000
          OSRM_BASE_URL: http://router.project-osrm.org

  test-contract:
    name: Test - Contract
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build shared helpers
        run: npm run build:shared

      - name: Run contract tests
        run: npm run test:contract
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          RABBITMQ_URL: amqp://localhost:5672
          JWT_SECRET: test-jwt-secret
          INTERNAL_SERVICE_TOKEN: test-internal-token

  test-integration:
    name: Test - Integration
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cab_booking
      MONGO_USER: mongo
      MONGO_PASSWORD: mongo
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      JWT_SECRET: test-jwt-secret
      REFRESH_TOKEN_SECRET: test-refresh-secret
      INTERNAL_SERVICE_TOKEN: test-internal-token
      OSRM_BASE_URL: http://router.project-osrm.org
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Start integration infrastructure
        run: docker compose -f .github/docker/docker-compose.integration.yml up -d --build --wait

      - name: Install dependencies
        run: npm install

      - name: Build backend artifacts in dependency order
        run: npm run build

      - name: Start backend services and run integration tests
        run: npx tsx scripts/run-integration-backend.ts

      - name: Print Node service logs on failure
        if: failure()
        run: |
          if [ -d .ci-logs ]; then
            for file in .ci-logs/*.log; do
              [ -f "$file" ] || continue
              echo "===== $file ====="
              tail -n 200 "$file"
            done
          fi

      - name: Print Docker logs on failure
        if: failure()
        run: docker compose -f .github/docker/docker-compose.integration.yml logs --no-color

      - name: Stop integration infrastructure
        if: always()
        run: docker compose -f .github/docker/docker-compose.integration.yml down -v

  test-ai:
    name: Test - AI Service
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: services/ai-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  docker-build-and-push:
    name: Docker - Build & Push
    runs-on: ubuntu-latest
    needs: [test-unit, test-contract, test-integration, test-ai]
    if: github.event_name != 'pull_request'
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            context: .
            dockerfile: ./services/api-gateway/Dockerfile
            needs_shared: true
          - service: auth-service
            context: .
            dockerfile: ./services/auth-service/Dockerfile
            needs_shared: true
          - service: booking-service
            context: .
            dockerfile: ./services/booking-service/Dockerfile
            needs_shared: true
          - service: driver-service
            context: .
            dockerfile: ./services/driver-service/Dockerfile
            needs_shared: true
          - service: notification-service
            context: .
            dockerfile: ./services/notification-service/Dockerfile
            needs_shared: true
          - service: payment-service
            context: .
            dockerfile: ./services/payment-service/Dockerfile
            needs_shared: true
          - service: pricing-service
            context: .
            dockerfile: ./services/pricing-service/Dockerfile
            needs_shared: true
          - service: review-service
            context: .
            dockerfile: ./services/review-service/Dockerfile
            needs_shared: true
          - service: ride-service
            context: .
            dockerfile: ./services/ride-service/Dockerfile
            needs_shared: true
          - service: user-service
            context: .
            dockerfile: ./services/user-service/Dockerfile
            needs_shared: true
          - service: ai-service
            context: ./services/ai-service
            dockerfile: ./services/ai-service/Dockerfile
            needs_shared: false
          - service: wallet-service
            context: ./services/wallet-service
            dockerfile: ./services/wallet-service/Dockerfile
            needs_shared: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: matrix.needs_shared
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        if: matrix.needs_shared
        run: npm install

      - name: Build shared helpers
        if: matrix.needs_shared
        run: npm run build:shared

      - name: Skip Docker publish when secrets are unavailable
        if: env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == ''
        run: echo "Docker Hub secrets are not configured. Skipping image publish for this run."

      - name: Set up Docker Buildx
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/cab-${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy — Backend (Docker Swarm on AWS EC2)
  # Required secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PORT (opt)
  # The server must already have ~/cab-booking/.env and ~/cab-booking/env/*.env
  # ──────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy - Backend
    runs-on: ubuntu-latest
    needs: [docker-build-and-push]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy stack file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "docker-stack.thesis.yml"
          target: "~/cab-booking/"
          strip_components: 0

      - name: Deploy Swarm stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ~/cab-booking

            export IMAGE_TAG=latest
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}

            set -o allexport
            [ -f .env ] && source .env
            set +o allexport

            echo "▶ Creating databases if not exist..."
            PGID=$(docker ps -q -f name=cab-booking_postgres 2>/dev/null | head -1)
            if [ -n "$PGID" ]; then
              for db in auth_db booking_db driver_db payment_db ride_db user_db wallet_db; do
                docker exec $PGID psql -U postgres -c "CREATE DATABASE $db;" 2>/dev/null || true
              done
            fi

            echo "▶ Deploying Swarm stack (tag=$IMAGE_TAG)..."
            docker stack deploy -c docker-stack.thesis.yml --with-registry-auth cab-booking

            echo "▶ Removing dangling images..."
            docker image prune -f

            echo "✅ Swarm deployment complete"

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy — Frontend (Build React SPAs → rsync → Nginx on VPS)
  # Required secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY,
  #                   REACT_APP_API_URL, REACT_APP_SOCKET_URL,
  #                   REACT_APP_GOOGLE_MAPS_API_KEY (optional)
  # Nginx on the server must serve:
  #   /home/<DEPLOY_USER>/customer-build  → port 4000
  #   /home/<DEPLOY_USER>/driver-build    → port 4001
  #   /home/<DEPLOY_USER>/admin-build     → port 4002
  # ──────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy - Frontend (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: [docker-build-and-push]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment:
      name: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: customer-app
            dir: apps/customer-app
            remote_dir: customer-build
          - app: driver-app
            dir: apps/driver-app
            remote_dir: driver-build
          - app: admin-dashboard
            dir: apps/admin-dashboard
            remote_dir: admin-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Install app dependencies
        working-directory: ${{ matrix.dir }}
        run: npm install

      - name: Build React app
        working-directory: ${{ matrix.dir }}
        run: npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_SOCKET_URL: ${{ secrets.REACT_APP_SOCKET_URL }}
          REACT_APP_GOOGLE_MAPS_API_KEY: ${{ secrets.REACT_APP_GOOGLE_MAPS_API_KEY }}
          GENERATE_SOURCEMAP: "false"
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Install rsync on runner
        run: sudo apt-get install -y rsync

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT || 22 }} -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync build to server
        run: |
          rsync -avzr --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT || 22 }} -o StrictHostKeyChecking=no" \
            ${{ matrix.dir }}/build/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/home/${{ secrets.DEPLOY_USER }}/${{ matrix.remote_dir }}/

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: sudo systemctl reload nginx && echo "✅ Nginx reloaded for ${{ matrix.app }}"
