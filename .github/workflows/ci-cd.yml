name: CI/CD - Docker Hub

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME || github.repository_owner }}

jobs:
  test-unit:
    name: Test - Unit
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      mongodb:
        image: mongo:7
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3.12-management-alpine
        options: >-
          --health-cmd "rabbitmq-diagnostics check_running"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5672:5672

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build shared helpers
        run: npm run build:shared

      - name: Run unit tests
        run: npm run test:unit
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          MONGODB_URI: mongodb://localhost:27017/test_db
          REDIS_URL: redis://localhost:6379
          RABBITMQ_URL: amqp://localhost:5672
          JWT_SECRET: test-jwt-secret
          REFRESH_TOKEN_SECRET: test-refresh-secret
          INTERNAL_SERVICE_TOKEN: test-internal-token
          AI_SERVICE_URL: http://127.0.0.1:8000
          OSRM_BASE_URL: http://router.project-osrm.org

  test-contract:
    name: Test - Contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build shared helpers
        run: npm run build:shared

      - name: Run contract tests
        run: npm run test:contract
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          RABBITMQ_URL: amqp://localhost:5672
          JWT_SECRET: test-jwt-secret
          INTERNAL_SERVICE_TOKEN: test-internal-token

  test-integration:
    name: Test - Integration
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cab_booking
      MONGO_USER: mongo
      MONGO_PASSWORD: mongo
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      JWT_SECRET: test-jwt-secret
      REFRESH_TOKEN_SECRET: test-refresh-secret
      INTERNAL_SERVICE_TOKEN: test-internal-token
      OSRM_BASE_URL: http://router.project-osrm.org
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Start integration infrastructure
        run: docker compose -f .github/docker/docker-compose.integration.yml up -d --build --wait

      - name: Install dependencies
        run: npm install

      - name: Build backend artifacts in dependency order
        run: npm run build

      - name: Start backend services and run integration tests
        run: npx tsx scripts/run-integration-backend.ts

      - name: Print Node service logs on failure
        if: failure()
        run: |
          if [ -d .ci-logs ]; then
            for file in .ci-logs/*.log; do
              [ -f "$file" ] || continue
              echo "===== $file ====="
              tail -n 200 "$file"
            done
          fi

      - name: Print Docker logs on failure
        if: failure()
        run: docker compose -f .github/docker/docker-compose.integration.yml logs --no-color

      - name: Stop integration infrastructure
        if: always()
        run: docker compose -f .github/docker/docker-compose.integration.yml down -v

  test-ai:
    name: Test - AI Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  docker-build-and-push:
    name: Docker - Build & Push
    runs-on: ubuntu-latest
    needs: [test-unit, test-contract, test-integration, test-ai]
    if: github.event_name != 'pull_request'
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            context: .
            dockerfile: ./services/api-gateway/Dockerfile
            needs_shared: true
          - service: auth-service
            context: .
            dockerfile: ./services/auth-service/Dockerfile
            needs_shared: true
          - service: booking-service
            context: ./services/booking-service
            dockerfile: ./services/booking-service/Dockerfile
            needs_shared: false
          - service: driver-service
            context: .
            dockerfile: ./services/driver-service/Dockerfile
            needs_shared: true
          - service: notification-service
            context: ./services/notification-service
            dockerfile: ./services/notification-service/Dockerfile
            needs_shared: false
          - service: payment-service
            context: ./services/payment-service
            dockerfile: ./services/payment-service/Dockerfile
            needs_shared: false
          - service: pricing-service
            context: .
            dockerfile: ./services/pricing-service/Dockerfile
            needs_shared: true
          - service: review-service
            context: ./services/review-service
            dockerfile: ./services/review-service/Dockerfile
            needs_shared: false
          - service: ride-service
            context: .
            dockerfile: ./services/ride-service/Dockerfile
            needs_shared: true
          - service: user-service
            context: ./services/user-service
            dockerfile: ./services/user-service/Dockerfile
            needs_shared: false
          - service: ai-service
            context: ./services/ai-service
            dockerfile: ./services/ai-service/Dockerfile
            needs_shared: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: matrix.needs_shared
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        if: matrix.needs_shared
        run: npm install

      - name: Build shared helpers
        if: matrix.needs_shared
        run: npm run build:shared

      - name: Skip Docker publish when secrets are unavailable
        if: env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == ''
        run: echo "Docker Hub secrets are not configured. Skipping image publish for this run."

      - name: Set up Docker Buildx
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/cab-${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
