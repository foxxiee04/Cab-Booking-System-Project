name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Node 22: dependency tree (e.g. chevrotain) declares engines >=22; aligns with npm registry tooling.
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.11'
  # Harden npm against transient ECONNRESET / aborted downloads on registry.npmjs.org
  NPM_CONFIG_FETCH_RETRIES: '5'
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: '20000'
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: '120000'
  IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME || github.repository_owner }}

# ──────────────────────────────────────────────────────────────────────────────
# STAGE 1 — Tests (all run in parallel, continue-on-error so deploy is never
#           blocked by a flaky test in dev/thesis mode)
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  test-unit:
    name: Test - Unit
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      mongodb:
        image: mongo:7
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3.12-management-alpine
        options: >-
          --health-cmd "rabbitmq-diagnostics check_running"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5672:5672

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          for attempt in 1 2 3 4; do
            npm ci && exit 0
            echo "::warning::npm ci failed (attempt ${attempt}/4), retrying in 20s..."
            sleep 20
          done
          exit 1

      - name: Build shared helpers
        run: npm run build:shared

      - name: Run unit tests
        run: npm run test:unit
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          MONGODB_URI: mongodb://localhost:27017/test_db
          REDIS_URL: redis://localhost:6379
          RABBITMQ_URL: amqp://localhost:5672
          JWT_SECRET: test-jwt-secret
          REFRESH_TOKEN_SECRET: test-refresh-secret
          INTERNAL_SERVICE_TOKEN: test-internal-token
          AI_SERVICE_URL: http://127.0.0.1:8000
          OSRM_BASE_URL: http://router.project-osrm.org

  # Contract tests: driver ↔ ride service (no infra needed — mocked in-process)
  test-contract:
    name: Test - Contract
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          for attempt in 1 2 3 4; do
            npm ci && exit 0
            echo "::warning::npm ci failed (attempt ${attempt}/4), retrying in 20s..."
            sleep 20
          done
          exit 1

      - name: Build shared helpers
        run: npm run build:shared

      - name: Run contract tests
        run: npm run test:contract
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          RABBITMQ_URL: amqp://localhost:5672
          JWT_SECRET: test-jwt-secret
          INTERNAL_SERVICE_TOKEN: test-internal-token

  test-integration:
    name: Test - Integration
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cab_booking
      MONGO_USER: mongo
      MONGO_PASSWORD: mongo
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      JWT_SECRET: test-jwt-secret
      REFRESH_TOKEN_SECRET: test-refresh-secret
      INTERNAL_SERVICE_TOKEN: test-internal-token
      OSRM_BASE_URL: http://router.project-osrm.org
      OTP_SMS_MODE: mock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Start integration infrastructure
        run: docker compose -f .github/docker/docker-compose.integration.yml up -d --wait
        # --build removed: images already public; --wait ensures containers are healthy

      - name: Install dependencies
        run: |
          for attempt in 1 2 3 4; do
            npm ci && exit 0
            echo "::warning::npm ci failed (attempt ${attempt}/4), retrying in 20s..."
            sleep 20
          done
          exit 1

      - name: Build shared helpers
        run: npm run build:shared

      - name: Run integration health checks
        run: npx tsx scripts/run-integration-backend.ts

      - name: Print Node service logs on failure
        if: failure()
        run: |
          if [ -d .ci-logs ]; then
            for file in .ci-logs/*.log; do
              [ -f "$file" ] || continue
              echo "===== $file ====="
              tail -n 200 "$file"
            done
          fi

      - name: Print Docker logs on failure
        if: failure()
        run: docker compose -f .github/docker/docker-compose.integration.yml logs --no-color

      - name: Stop integration infrastructure
        if: always()
        run: docker compose -f .github/docker/docker-compose.integration.yml down -v

  test-ai:
    name: Test - AI Service
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: services/ai-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/ai-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

# ──────────────────────────────────────────────────────────────────────────────
# STAGE 2 — Build & push Docker images
# Each service is built in a separate matrix job (parallel).
# Services that reference shared/ must be built from root context (context: .)
# so the Dockerfile can COPY services/<name>/ and shared/dist/.
# wallet-service has no shared dependency → uses its own directory as context.
# ──────────────────────────────────────────────────────────────────────────────
  docker-build-and-push:
    name: Docker - Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [test-unit, test-contract, test-integration, test-ai]
    if: github.event_name != 'pull_request'
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: bootstrap-runner
            context: .
            dockerfile: ./Dockerfile.bootstrap
            needs_shared: false
          - service: autoscaler
            context: .
            dockerfile: ./Dockerfile.autoscaler
            needs_shared: false
          # ── Root-context services (Dockerfile copies from services/<name>/ + shared/dist/) ──
          - service: api-gateway
            context: .
            dockerfile: ./services/api-gateway/Dockerfile
            needs_shared: true
          - service: auth-service
            context: .
            dockerfile: ./services/auth-service/Dockerfile
            needs_shared: true
          - service: booking-service
            context: .
            dockerfile: ./services/booking-service/Dockerfile
            needs_shared: true
          - service: driver-service
            context: .
            dockerfile: ./services/driver-service/Dockerfile
            needs_shared: true
          - service: notification-service
            context: .
            dockerfile: ./services/notification-service/Dockerfile
            needs_shared: true
          - service: payment-service
            context: .
            dockerfile: ./services/payment-service/Dockerfile
            needs_shared: true
          - service: pricing-service
            context: .
            dockerfile: ./services/pricing-service/Dockerfile
            needs_shared: true
          - service: review-service
            context: .
            dockerfile: ./services/review-service/Dockerfile
            needs_shared: true
          - service: ride-service
            context: .
            dockerfile: ./services/ride-service/Dockerfile
            needs_shared: true
          - service: user-service
            context: .
            dockerfile: ./services/user-service/Dockerfile
            needs_shared: true
          # ── Local-context services (self-contained, no shared/ dependency) ──
          - service: ai-service
            context: ./services/ai-service
            dockerfile: ./services/ai-service/Dockerfile
            needs_shared: false
          - service: wallet-service
            context: ./services/wallet-service
            dockerfile: ./services/wallet-service/Dockerfile
            needs_shared: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: matrix.needs_shared
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        if: matrix.needs_shared
        run: |
          for attempt in 1 2 3 4; do
            npm ci && exit 0
            echo "::warning::npm ci failed (attempt ${attempt}/4), retrying in 20s..."
            sleep 20
          done
          exit 1

      - name: Build shared helpers
        if: matrix.needs_shared
        run: npm run build:shared

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/cab-${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

# ──────────────────────────────────────────────────────────────────────────────
# STAGE 3a — Deploy Backend (Docker Swarm on AWS EC2)
#
# Required GitHub secrets:
#   DEPLOY_HOST       EC2 public IP / hostname
#   DEPLOY_USER       SSH user (e.g. ubuntu)
#   DEPLOY_SSH_KEY    Private key for SSH (PEM format)
#   DEPLOY_PORT       SSH port (optional, defaults to 22)
#   DOCKERHUB_USERNAME
#
# Pre-requisites on the server:
#   ~/cab-booking/.env              — all service environment variables
#   ~/cab-booking/env/*.env         — per-service env files (if used)
#   ~/cab-booking/docker-stack.thesis.yml  — uploaded by this workflow
#
# Nginx: workflow installs deploy/nginx/conf.d/00-cab-client-max-body.conf so
# API uploads (driver profile JSON) are not capped at the default 1m.
#
# GitHub secrets: REACT_APP_API_URL / REACT_APP_SOCKET_URL must use https:// when
# SPAs are served over HTTPS (mixed content blocks http:// API calls).
# ──────────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy - Backend (Swarm)
    runs-on: ubuntu-latest
    needs: [docker-build-and-push]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    # To enable manual approval gate: create a "production" environment in
    # GitHub → Settings → Environments and uncomment the line below.
    # environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy stack, env, and monitoring files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "docker-stack.thesis.yml,monitoring,env,scripts,reset-and-seed.sh,deploy/nginx"
          target: "~/cab-booking/"
          strip_components: 0

      - name: Write inter-node SSH key on manager
        uses: appleboy/ssh-action@v1.0.3
        env:
          SWARM_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: SWARM_SSH_KEY
          script: |
            mkdir -p ~/.ssh
            printf '%s\n' "$SWARM_SSH_KEY" > ~/.ssh/swarm_key
            chmod 600 ~/.ssh/swarm_key

      - name: Deploy Swarm stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ~/cab-booking

            export IMAGE_TAG=latest
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}

            set -o allexport
            [ -f .env ] && source .env
            set +o allexport

            # Authenticate to Docker Hub (prevents anonymous pull rate-limits).
            # Requires DOCKERHUB_TOKEN in ~/cab-booking/.env on the server.
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin 2>/dev/null || true

            echo "▶ Cleaning up disk BEFORE pulling (unused images older than 6h, all nodes)..."
            for node_ip in $(docker node inspect $(docker node ls -q) --format '{{.Status.Addr}}' 2>/dev/null); do
              ssh -i ~/.ssh/swarm_key -o StrictHostKeyChecking=no -o ConnectTimeout=5 ubuntu@$node_ip \
                "docker image prune -af --filter 'until=6h' 2>/dev/null || true; docker builder prune -af 2>/dev/null || true" 2>/dev/null || true
            done

            echo "▶ Pre-pulling service images on manager..."
            for svc in api-gateway auth-service ride-service driver-service payment-service \
                       wallet-service user-service booking-service pricing-service \
                       notification-service review-service ai-service autoscaler bootstrap-runner; do
              docker pull "${DOCKERHUB_USERNAME}/cab-${svc}:${IMAGE_TAG}" &
            done
            wait

            echo "▶ Pre-pulling service images on worker nodes..."
            for node_ip in $(docker node inspect \
                $(docker node ls -q --filter role=worker) \
                --format '{{.Status.Addr}}' 2>/dev/null); do
              ssh -i ~/.ssh/swarm_key -o StrictHostKeyChecking=no -o ConnectTimeout=5 ubuntu@$node_ip "
                for svc in api-gateway auth-service ride-service driver-service payment-service \
                           wallet-service user-service booking-service pricing-service \
                           notification-service review-service ai-service autoscaler bootstrap-runner; do
                  docker pull ${DOCKERHUB_USERNAME}/cab-\${svc}:${IMAGE_TAG} &
                done
                wait
              " 2>/dev/null || true
            done

            echo "▶ Setting node labels on Primary Manager..."
            SELF_ID=$(docker info --format '{{.Swarm.NodeID}}')
            docker node update --label-add infra=true  "$SELF_ID" 2>/dev/null || true
            docker node update --label-add nginx=true  "$SELF_ID" 2>/dev/null || true
            echo "  Manager $SELF_ID labelled (infra=true, nginx=true)"

            echo "▶ Deploying stack (tag=$IMAGE_TAG)..."
            docker stack deploy \
              -c docker-stack.thesis.yml \
              --with-registry-auth \
              --resolve-image always \
              --prune \
              cab-booking

            echo "▶ Waiting for postgres to be ready..."
            PGID=""
            for i in $(seq 1 36); do
              PGID=$(docker ps --filter "name=cab-booking_postgres" --format "{{.ID}}" | head -1)
              if [ -n "$PGID" ] && docker exec "$PGID" pg_isready -U postgres -q 2>/dev/null; then
                echo "  postgres ready (attempt $i)"
                break
              fi
              echo "  waiting... ($i/36)"
              sleep 5
            done

            if [ -n "$PGID" ]; then
              echo "▶ Ensuring databases exist..."
              for db in auth_db booking_db driver_db payment_db ride_db user_db wallet_db; do
                docker exec "$PGID" psql -U postgres -tc "SELECT 1 FROM pg_database WHERE datname='$db'" \
                  | grep -q 1 || docker exec "$PGID" psql -U postgres -c "CREATE DATABASE $db;"
              done
              echo "  databases OK"
            else
              echo "⚠ postgres not reachable after 180s — run manually: docker exec <postgres-id> psql -U postgres -f /docker-entrypoint-initdb.d/init.sql"
            fi

            echo "▶ Post-deploy prune (all Swarm nodes): stopped containers + unused images/networks; KHÔNG xóa volume (--volumes không bật)..."
            for node_ip in $(docker node inspect $(docker node ls -q) --format '{{.Status.Addr}}' 2>/dev/null); do
              ssh -i ~/.ssh/swarm_key -o StrictHostKeyChecking=no -o ConnectTimeout=12 ubuntu@$node_ip \
                "docker system prune -af 2>/dev/null || true; df -h / | tail -1" 2>/dev/null || true
            done

            echo "✅ Swarm deployment complete"

            echo "▶ Nginx: ensure API body size limit (driver profile / large JSON)..."
            NGX_SNIPPET="$HOME/cab-booking/deploy/nginx/conf.d/00-cab-client-max-body.conf"
            if [ -f "$NGX_SNIPPET" ]; then
              sudo install -m 644 "$NGX_SNIPPET" /etc/nginx/conf.d/00-cab-client-max-body.conf
              sudo nginx -t && sudo systemctl reload nginx
              echo "  nginx OK (client_max_body_size via conf.d)"
            else
              echo "  ⚠ skip — snippet missing at $NGX_SNIPPET (older checkout?)"
            fi

# ──────────────────────────────────────────────────────────────────────────────
# STAGE 3b — Deploy Frontend (Build React SPAs → rsync → Nginx)
#
# Required GitHub secrets:
#   DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PORT (opt)
#   REACT_APP_API_URL      e.g. https://api.yourdomain.com
#   REACT_APP_SOCKET_URL   e.g. https://api.yourdomain.com
#   REACT_APP_GOOGLE_MAPS_API_KEY  (optional)
#
# Nginx on the server must serve:
#   /home/<DEPLOY_USER>/customer-build  → port 4000
#   /home/<DEPLOY_USER>/driver-build    → port 4001
#   /home/<DEPLOY_USER>/admin-build     → port 4002
# ──────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy - Frontend (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: [docker-build-and-push]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    # environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: customer-app
            dir: apps/customer-app
            remote_dir: customer-build
          - app: driver-app
            dir: apps/driver-app
            remote_dir: driver-build
          - app: admin-dashboard
            dir: apps/admin-dashboard
            remote_dir: admin-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          # Each frontend app has its own package-lock.json (not a workspace package)
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Install app dependencies
        working-directory: ${{ matrix.dir }}
        run: |
          for attempt in 1 2 3 4; do
            npm ci && exit 0
            echo "::warning::npm ci failed (attempt ${attempt}/4), retrying in 20s..."
            sleep 20
          done
          exit 1

      - name: Build React app
        working-directory: ${{ matrix.dir }}
        run: npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_SOCKET_URL: ${{ secrets.REACT_APP_SOCKET_URL }}
          REACT_APP_GOOGLE_MAPS_API_KEY: ${{ secrets.REACT_APP_GOOGLE_MAPS_API_KEY }}
          GENERATE_SOURCEMAP: "false"
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Install rsync on runner
        run: sudo apt-get install -y rsync

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT || 22 }} -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync build to server
        run: |
          rsync -avzr --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT || 22 }} -o StrictHostKeyChecking=no" \
            ${{ matrix.dir }}/build/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/home/${{ secrets.DEPLOY_USER }}/${{ matrix.remote_dir }}/

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: sudo systemctl reload nginx && echo "✅ Nginx reloaded for ${{ matrix.app }}"
