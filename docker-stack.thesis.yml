# Docker Swarm Stack — Thesis Production
#
# Topology:
#   Manager     (on-demand, t3.medium) : infra stateful (postgres, mongodb,
#                                         redis, rabbitmq), api-gateway,
#                                         monitoring (prometheus, grafana, loki)
#   Worker-1..N : microservices + ai-service on workers only (not infra). Balance across
#   two workers with labels app.half=1 and app.half=2 (see MICROSERVICES section).
#
#   Global services (every node): promtail, cadvisor, node-exporter
#
# HA note (báo cáo):
#   Promote a second on-demand node as manager for Raft quorum:
#     docker node promote <secondary-node-id>
#   Secondary manager does NOT run app services (no constraints match).
#
# ── Setup commands ─────────────────────────────────────────────────────────
#
#  1. On Manager — init swarm:
#       docker swarm init --advertise-addr <MANAGER_PRIVATE_IP>
#
#  2. On Manager — create secrets:
#       echo "postgres" | docker secret create postgres_user -
#       echo "pg_pass"  | docker secret create postgres_password -
#       echo "mongo"    | docker secret create mongo_user -
#       echo "mg_pass"  | docker secret create mongo_password -
#
#  3. On Manager — get worker join token:
#       docker swarm join-token worker
#
#  4. On each Spot Worker — join swarm (run the command from step 3)
#
#  5. Deploy:
#       export DOCKERHUB_USERNAME=foxxiee04
#       export IMAGE_TAG=latest
#       docker stack deploy -c docker-stack.thesis.yml --with-registry-auth cab-booking
#
# ── Scale workers ──────────────────────────────────────────────────────────
#   Add a worker → join swarm → set labels (once):
#     docker node update --label-add app.half=1 <NODE_ID_WORKER_A>
#     docker node update --label-add app.half=2 <NODE_ID_WORKER_B>
#
# ── Spot instance handling ─────────────────────────────────────────────────
#   stop_grace_period: 30s lets containers flush state before termination.
#   With replicas: 1, if the worker running a service is terminated, Swarm
#   reschedules the task on another available worker within ~10-30s.
# ──────────────────────────────────────────────────────────────────────────

services:

  # ══════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE — pinned to Manager (stateful, must never be on spot)
  # ══════════════════════════════════════════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: cab_booking
    volumes:
      - postgres_data:/var/lib/postgresql/data
    configs:
      - source: postgres_init_db
        target: /docker-entrypoint-initdb.d/init.sql
        mode: 0444
    networks:
      - backend
    ports:
      # Host seed (npm run db:seed on Primary Manager): Prisma INSERT bootstrap admin connects here.
      # Restrict port 5433 in the security group to your IP in production unless you tunnel.
      - "5433:5432"
    secrets:
      - postgres_user
      - postgres_password
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME_FILE: /run/secrets/mongo_user
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongo_password
    volumes:
      - mongo_data:/data/db
    networks:
      - backend
    ports:
      # Host seed (scripts/seed-database.ts hist + reviews): bootstrap-runner --network host cần Mongo tại localhost.
      # Giới hạn SG: không mở 27017 ra 0.0.0.0/0 nếu không cần; chỉ SSH vào Manager là đủ cho seed.
      - "27017:27017"
    secrets:
      - mongo_user
      - mongo_password
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - backend
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-rabbit}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-rabbit123}
      RABBITMQ_PROMETHEUS_RETURN_PER_OBJECT_METRICS: "true"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ══════════════════════════════════════════════════════════════════════════
  # API GATEWAY — Manager (public Elastic IP is here)
  # ══════════════════════════════════════════════════════════════════════════

  api-gateway:
    image: ${DOCKERHUB_USERNAME}/cab-api-gateway:${IMAGE_TAG:-latest}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - OTP_ENABLE_DEV_ENDPOINT=true
    env_file:
      - ./env/gateway.env
    networks:
      - frontend
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.nginx == true
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          cpus: '0.75'
          memory: 384M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ══════════════════════════════════════════════════════════════════════════
  # MICROSERVICES — Workers, split across two halves (replicas unchanged: 1 each)
  # Prerequisites: exactly two workers labelled app.half=1 and app.half=2.
  # (~5 services on half 1, ~6 on half 2 incl. ai-service + pricing→AI same half OK)
  # ══════════════════════════════════════════════════════════════════════════

  auth-service:
    image: ${DOCKERHUB_USERNAME}/cab-auth-service:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - PORT=3001
      - GRPC_PORT=50051
      - OTP_SMS_MODE=mock
      - OTP_ENABLE_DEV_ENDPOINT=true
    env_file:
      - ./env/auth.env
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          - node.labels.app.half == 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 128M

  ride-service:
    image: ${DOCKERHUB_USERNAME}/cab-ride-service:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - PORT=3002
      - GRPC_PORT=50054
    env_file:
      - ./env/ride.env
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          - node.labels.app.half == 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 128M

  driver-service:
    image: ${DOCKERHUB_USERNAME}/cab-driver-service:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - PORT=3003
      - GRPC_PORT=50055
    env_file:
      - ./env/driver.env
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          - node.labels.app.half == 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 128M

  payment-service:
    image: ${DOCKERHUB_USERNAME}/cab-payment-service:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - PORT=3004
      - GRPC_PORT=50056
      - ALLOW_SANDBOX_ENDPOINT=true
    env_file:
      - ./env/payment.env
    networks:
      - frontend
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          - node.labels.app.half == 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 128M

  wallet-service:
    image: ${DOCKERHUB_USERNAME}/cab-wallet-service:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - PORT=3006
    env_file:
      - ./env/wallet.env
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          - node.labels.app.half == 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 128M

  user-service:
    image: ${DOCKERHUB_USERNAME}/cab-user-service:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - PORT=3007
      - GRPC_PORT=50052
    env_file:
      - ./env/user.env
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          - node.labels.app.half == 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 128M

  booking-service:
    image: ${DOCKERHUB_USERNAME}/cab-booking-service:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - PORT=3008
      - GRPC_PORT=50053
    env_file:
      - ./env/booking.env
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          - node.labels.app.half == 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 128M

  pricing-service:
    image: ${DOCKERHUB_USERNAME}/cab-pricing-service:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - PORT=3009
      - GRPC_PORT=50057
      - AI_SERVICE_URL=http://ai-service:8000
    env_file:
      - ./env/pricing.env
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          - node.labels.app.half == 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 128M

  notification-service:
    image: ${DOCKERHUB_USERNAME}/cab-notification-service:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - PORT=3005
    env_file:
      - ./env/notification.env
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          - node.labels.app.half == 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 128M

  review-service:
    image: ${DOCKERHUB_USERNAME}/cab-review-service:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - PORT=3010
    env_file:
      - ./env/review.env
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          - node.labels.app.half == 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 128M

  ai-service:
    image: ${DOCKERHUB_USERNAME}/cab-ai-service:${IMAGE_TAG:-latest}
    # Avoid flaky Swarm/embedded DNS (127.0.0.11) → Gemini / huggingface name resolution errors.
    # Set in ~/cab-booking/.env before deploy: AI_SERVICE_DNS_1=172.31.0.2 AI_SERVICE_DNS_2=8.8.8.8 (AWS VPC).
    # Note: dns_opt is not supported on some docker stack deploy versions; rely on VPC DNS order above.
    dns:
      - ${AI_SERVICE_DNS_1:-8.8.8.8}
      - ${AI_SERVICE_DNS_2:-8.8.4.4}
    volumes:
      # Persist HuggingFace model cache across container restarts — eliminates
      # re-download of vietnamese-bi-encoder + bge-reranker-v2-m3 (~1GB) on each deploy.
      # First start still downloads; subsequent restarts skip network fetch entirely.
      - hf_model_cache:/root/.cache/huggingface
    # Do not set extra_hosts for huggingface.co here: a pinned CDN IP often yields
    # Errno 101 "Network is unreachable" inside Swarm overlay while host/docker0 works.
    # If you only ever see DNS -3 (not 101), temporarily: docker service update --host-add "huggingface.co:<dig-ip>" cab-booking_ai-service
    environment:
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=8000
      - MODEL_PATH=app/models/eta_price_model.joblib
      - ACCEPT_MODEL_PATH=app/models/accept_model.joblib
      - WAIT_MODEL_PATH=app/models/wait_model.joblib
      - MODEL_VERSION=${MODEL_VERSION:-eta-rf-v2}
      - FEATURE_VERSION=${FEATURE_VERSION:-features-v1}
      - SUGGESTED_RADIUS_MIN_KM=${SUGGESTED_RADIUS_MIN_KM:-2.0}
      - SUGGESTED_RADIUS_MAX_KM=${SUGGESTED_RADIUS_MAX_KM:-5.0}
      - SUGGESTED_SURGE_MIN=${SUGGESTED_SURGE_MIN:-1.0}
      - SUGGESTED_SURGE_MAX=${SUGGESTED_SURGE_MAX:-2.0}
      - RAG_LLM_PROVIDER=${RAG_LLM_PROVIDER:-auto}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - RAG_LLM_MODEL_CLAUDE=${RAG_LLM_MODEL_CLAUDE:-claude-haiku-4-5-20251001}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      # Defaults aligned with services/ai-service/.env.example + rag_service.py (same as sensible local dev).
      - RAG_LLM_MODEL=${RAG_LLM_MODEL:-llama-3.3-70b-versatile}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - RAG_LLM_MODEL_GEMINI=${RAG_LLM_MODEL_GEMINI:-gemini-2.5-flash}
      - RAG_LLM_MODEL_GEMINI_REWRITE=${RAG_LLM_MODEL_GEMINI_REWRITE:-gemini-2.5-flash}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - RAG_LLM_MODEL_OPENAI=${RAG_LLM_MODEL_OPENAI:-gpt-4o-mini}
      - RAG_LLM_TIMEOUT_S=${RAG_LLM_TIMEOUT_S:-5}
      - RAG_LLM_REWRITE_TIMEOUT_S=${RAG_LLM_REWRITE_TIMEOUT_S:-3}
      - RAG_LLM_MAX_TOKENS=${RAG_LLM_MAX_TOKENS:-900}
      - RAG_LLM_TEMPERATURE=${RAG_LLM_TEMPERATURE:-0.25}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-bkai-foundation-models/vietnamese-bi-encoder}
      - RAG_TOP_K=${RAG_TOP_K:-8}
      - RAG_MIN_SEMANTIC=${RAG_MIN_SEMANTIC:-0.35}
      - RAG_FAISS_PREFILTER=${RAG_FAISS_PREFILTER:-0.16}
      - RAG_MAX_CONTEXT_CHARS=${RAG_MAX_CONTEXT_CHARS:-6400}
      - RAG_COSINE_ABSENT=${RAG_COSINE_ABSENT:-0.22}
      - RAG_COSINE_LLM=${RAG_COSINE_LLM:-0.30}
      # Air-gap / weak workers: set RAG_RERANKER_ENABLED=false and a smaller RAG_EMBEDDING_MODEL in .env.
      - RAG_RERANKER_ENABLED=${RAG_RERANKER_ENABLED:-true}
      - RAG_RERANKER_MODEL=${RAG_RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      - RAG_RERANK_POOL=${RAG_RERANK_POOL:-20}
      - RAG_QUERY_REWRITE_ENABLED=${RAG_QUERY_REWRITE_ENABLED:-true}
      - RAG_QUERY_REWRITE_PROVIDER=${RAG_QUERY_REWRITE_PROVIDER:-auto}
      # Prod Swarm: thường 86400 (24h) hoặc 0 — đặt trong .env trước khi deploy stack
      - AI_AUTO_RELOAD_RAG_SEC=${AI_AUTO_RELOAD_RAG_SEC:-0}
      - AI_AUTO_RETRAIN_SEC=${AI_AUTO_RETRAIN_SEC:-0}
      - AI_AUTO_RETRAIN_ENABLED=${AI_AUTO_RETRAIN_ENABLED:-false}
      - AI_INTERNAL_TOKEN=${AI_INTERNAL_TOKEN:-}
      # After first successful deploy (models cached in hf_model_cache volume),
      # set HF_HUB_OFFLINE=1 TRANSFORMERS_OFFLINE=1 in .env to skip network on restart.
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
      - HF_HOME=/root/.cache/huggingface
    # Swarm: image HEALTHCHECK start_period=60s can be too short on small CPUs (RAG + reranker load).
    networks:
      - backend
      # backend is internal; this non-internal overlay gives AI outbound access
      # for OpenAI/Gemini/HuggingFace while keeping port 8000 unpublished.
      - frontend
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; r=urlopen('http://127.0.0.1:8000/api/health'); raise SystemExit(0 if r.status==200 else 1)",
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 180s
    deploy:
      replicas: 1
      placement:
        # Dedicated ML worker. Do not co-locate AI with app.half workers on small nodes.
        constraints:
          - node.role == worker
          - node.labels.ml == true
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      resources:
        limits:
          cpus: '1.5'
          # RAG + reranker need a dedicated 8GB+ worker for local-like quality.
          memory: 6144M
        reservations:
          cpus: '0.5'
          memory: 2048M

  # ══════════════════════════════════════════════════════════════════════════
  # AUTO-SCALER — chạy trên Manager, query Prometheus → docker service scale
  # ══════════════════════════════════════════════════════════════════════════

  autoscaler:
    image: ${DOCKERHUB_USERNAME}/cab-autoscaler:${IMAGE_TAG:-latest}
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - STACK_NAME=cab-booking
      - SCALE_INTERVAL_SEC=30
      - SCALE_UP_CPU_PCT=65
      - SCALE_DOWN_CPU_PCT=20
      - MAX_REPLICAS=3
      - MIN_REPLICAS=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      restart_policy:
        condition: on-failure
        delay: 10s
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

  # ══════════════════════════════════════════════════════════════════════════
  # MONITORING — Collectors: mode global (chạy trên TẤT CẢ nodes tự động)
  # ══════════════════════════════════════════════════════════════════════════

  promtail:
    image: grafana/promtail:3.1.1
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    configs:
      - source: promtail_config_v2
        target: /etc/promtail/promtail-config.yml
        mode: 0444
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Node-local bind mount keeps positions per-node (global mode = 1 replica/node).
      # /var/lib/promtail is created on each Swarm node via cloud-init or first-run.
      - /var/lib/promtail:/var/lib/promtail
    networks:
      - backend
    deploy:
      mode: global          # auto-deployed to every node (manager + all workers)
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    ports:
      - target: 8080
        published: 8081
        protocol: tcp
        mode: host
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - backend
    deploy:
      mode: global          # container metrics from every node
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    ports:
      - target: 9100
        published: 9100
        protocol: tcp
        mode: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - backend
    deploy:
      mode: global          # host metrics from every node
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

  # ── Monitoring backends — pinned to Manager (stateful) ──────────────────

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
      # Docker socket: lets Prometheus auto-discover all Swarm nodes
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  grafana:
    image: grafana/grafana:11.1.4
    ports:
      - "3030:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - frontend
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  loki:
    image: grafana/loki:3.1.1
    ports:
      - "3100:3100"
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

# ══════════════════════════════════════════════════════════════════════════
# VOLUMES — all on Manager (local driver, not replicated)
# ══════════════════════════════════════════════════════════════════════════
volumes:
  postgres_data:
    name: cab-booking-postgres-data
    driver: local
  mongo_data:
    name: cab-booking-mongo-data
    driver: local
  redis_data:
    name: cab-booking-redis-data
    driver: local
  rabbitmq_data:
    name: cab-booking-rabbitmq-data
    driver: local
  prometheus_data:
    name: cab-booking-prometheus-data
    driver: local
  grafana_data:
    name: cab-booking-grafana-data
    driver: local
  loki_data:
    name: cab-booking-loki-data
    driver: local
  hf_model_cache:
    name: cab-booking-hf-model-cache
    driver: local

# ══════════════════════════════════════════════════════════════════════════
# NETWORKS
# ══════════════════════════════════════════════════════════════════════════
networks:
  frontend:
    driver: overlay
    attachable: true
  backend:
    driver: overlay
    internal: true

# ══════════════════════════════════════════════════════════════════════════
# SECRETS (must be created manually before deploy — see setup commands above)
# ══════════════════════════════════════════════════════════════════════════
secrets:
  postgres_user:
    external: true
  postgres_password:
    external: true
  mongo_user:
    external: true
  mongo_password:
    external: true

# ══════════════════════════════════════════════════════════════════════════
# CONFIGS — distributed to containers via Swarm (immutable, content-addressed)
# ══════════════════════════════════════════════════════════════════════════
configs:
  postgres_init_db:
    file: ./scripts/init-db.sql
  promtail_config_v2:
    file: ./monitoring/promtail/promtail-config.yml
