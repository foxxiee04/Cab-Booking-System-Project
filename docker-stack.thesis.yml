# Docker Swarm Stack — Thesis Production
#
# Topology:
#   Manager     (on-demand, t3.medium) : infra stateful (postgres, mongodb,
#                                         redis, rabbitmq), api-gateway,
#                                         monitoring (prometheus, grafana, loki)
#   Worker-1..N (spot,      t3.medium) : all 11 microservices — Swarm
#                                         auto-spreads across available workers
#
#   Global services (every node): promtail, cadvisor, node-exporter
#
# HA note (báo cáo):
#   Promote a second on-demand node as manager for Raft quorum:
#     docker node promote <secondary-node-id>
#   Secondary manager does NOT run app services (no constraints match).
#
# ── Setup commands ─────────────────────────────────────────────────────────
#
#  1. On Manager — init swarm:
#       docker swarm init --advertise-addr <MANAGER_PRIVATE_IP>
#
#  2. On Manager — create secrets:
#       echo "postgres" | docker secret create postgres_user -
#       echo "pg_pass"  | docker secret create postgres_password -
#       echo "mongo"    | docker secret create mongo_user -
#       echo "mg_pass"  | docker secret create mongo_password -
#
#  3. On Manager — get worker join token:
#       docker swarm join-token worker
#
#  4. On each Spot Worker — join swarm (run the command from step 3)
#
#  5. Deploy:
#       export DOCKERHUB_USERNAME=foxxiee04
#       export IMAGE_TAG=latest
#       docker stack deploy -c docker-stack.thesis.yml --with-registry-auth cab-booking
#
# ── Scale workers ──────────────────────────────────────────────────────────
#   Add a spot instance → install Docker → join swarm → services auto-spread.
#
# ── Spot instance handling ─────────────────────────────────────────────────
#   stop_grace_period: 30s lets containers flush state before termination.
#   With replicas: 1, if the worker running a service is terminated, Swarm
#   reschedules the task on another available worker within ~10-30s.
# ──────────────────────────────────────────────────────────────────────────

services:

  # ══════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE — pinned to Manager (stateful, must never be on spot)
  # ══════════════════════════════════════════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: cab_booking
    volumes:
      - postgres_data:/var/lib/postgresql/data
    configs:
      - source: postgres_init_db
        target: /docker-entrypoint-initdb.d/init.sql
        mode: 0444
    networks:
      - backend
    secrets:
      - postgres_user
      - postgres_password
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME_FILE: /run/secrets/mongo_user
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongo_password
    volumes:
      - mongo_data:/data/db
    networks:
      - backend
    secrets:
      - mongo_user
      - mongo_password
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - backend
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-rabbit}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-rabbit123}
      RABBITMQ_PROMETHEUS_RETURN_PER_OBJECT_METRICS: "true"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ══════════════════════════════════════════════════════════════════════════
  # API GATEWAY — Manager (public Elastic IP is here)
  # ══════════════════════════════════════════════════════════════════════════

  api-gateway:
    image: ${DOCKERHUB_USERNAME}/cab-api-gateway:${IMAGE_TAG:-latest}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - OTP_ENABLE_DEV_ENDPOINT=true
    env_file:
      - ./env/gateway.env
    networks:
      - frontend
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.nginx == true
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          cpus: '0.75'
          memory: 384M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ══════════════════════════════════════════════════════════════════════════
  # MICROSERVICES — Spot Workers
  # Swarm auto-spreads across all available worker nodes.
  # When a spot instance is terminated, Swarm reschedules on remaining workers.
  # ══════════════════════════════════════════════════════════════════════════

  auth-service:
    image: ${DOCKERHUB_USERNAME}/cab-auth-service:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - PORT=3001
      - GRPC_PORT=50051
      - OTP_SMS_MODE=mock
      - OTP_ENABLE_DEV_ENDPOINT=true
    env_file:
      - ./env/auth.env
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        preferences:
          - spread: node.id
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  ride-service:
    image: ${DOCKERHUB_USERNAME}/cab-ride-service:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - PORT=3002
      - GRPC_PORT=50054
    env_file:
      - ./env/ride.env
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        preferences:
          - spread: node.id
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  driver-service:
    image: ${DOCKERHUB_USERNAME}/cab-driver-service:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - PORT=3003
      - GRPC_PORT=50055
    env_file:
      - ./env/driver.env
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        preferences:
          - spread: node.id
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  payment-service:
    image: ${DOCKERHUB_USERNAME}/cab-payment-service:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - PORT=3004
      - GRPC_PORT=50056
    env_file:
      - ./env/payment.env
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        preferences:
          - spread: node.id
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  wallet-service:
    image: ${DOCKERHUB_USERNAME}/cab-wallet-service:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - PORT=3006
    env_file:
      - ./env/wallet.env
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        preferences:
          - spread: node.id
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  user-service:
    image: ${DOCKERHUB_USERNAME}/cab-user-service:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - PORT=3007
      - GRPC_PORT=50052
    env_file:
      - ./env/user.env
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        preferences:
          - spread: node.id
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  booking-service:
    image: ${DOCKERHUB_USERNAME}/cab-booking-service:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - PORT=3008
      - GRPC_PORT=50053
    env_file:
      - ./env/booking.env
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        preferences:
          - spread: node.id
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  pricing-service:
    image: ${DOCKERHUB_USERNAME}/cab-pricing-service:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - PORT=3009
      - GRPC_PORT=50057
      - AI_SERVICE_URL=http://ai-service:8000
    env_file:
      - ./env/pricing.env
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        preferences:
          - spread: node.id
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  notification-service:
    image: ${DOCKERHUB_USERNAME}/cab-notification-service:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - PORT=3005
    env_file:
      - ./env/notification.env
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        preferences:
          - spread: node.id
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  review-service:
    image: ${DOCKERHUB_USERNAME}/cab-review-service:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - PORT=3010
    env_file:
      - ./env/review.env
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        preferences:
          - spread: node.id
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  ai-service:
    image: ${DOCKERHUB_USERNAME}/cab-ai-service:${IMAGE_TAG:-latest}
    environment:
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=8000
      - MODEL_PATH=app/models/eta_price_model.joblib
      - RAG_LLM_PROVIDER=${RAG_LLM_PROVIDER:-auto}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      resources:
        limits:
          cpus: '1'
          memory: 1536M
        reservations:
          cpus: '0.25'
          memory: 512M

  # ══════════════════════════════════════════════════════════════════════════
  # MONITORING — Collectors: mode global (chạy trên TẤT CẢ nodes tự động)
  # ══════════════════════════════════════════════════════════════════════════

  promtail:
    image: grafana/promtail:3.1.1
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend
    deploy:
      mode: global          # auto-deployed to every node (manager + all workers)
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - backend
    deploy:
      mode: global          # container metrics from every node
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /:/host:ro,rslave
    networks:
      - backend
    deploy:
      mode: global          # host metrics from every node
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

  # ── Monitoring backends — pinned to Manager (stateful) ──────────────────

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
      # Docker socket: lets Prometheus auto-discover all Swarm nodes
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  grafana:
    image: grafana/grafana:11.1.4
    ports:
      - "3030:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - frontend
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  loki:
    image: grafana/loki:3.1.1
    ports:
      - "3100:3100"
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

# ══════════════════════════════════════════════════════════════════════════
# VOLUMES — all on Manager (local driver, not replicated)
# ══════════════════════════════════════════════════════════════════════════
volumes:
  postgres_data:
    name: cab-booking-postgres-data
    driver: local
  mongo_data:
    name: cab-booking-mongo-data
    driver: local
  redis_data:
    name: cab-booking-redis-data
    driver: local
  rabbitmq_data:
    name: cab-booking-rabbitmq-data
    driver: local
  prometheus_data:
    name: cab-booking-prometheus-data
    driver: local
  grafana_data:
    name: cab-booking-grafana-data
    driver: local
  loki_data:
    name: cab-booking-loki-data
    driver: local

# ══════════════════════════════════════════════════════════════════════════
# NETWORKS
# ══════════════════════════════════════════════════════════════════════════
networks:
  frontend:
    driver: overlay
    attachable: true
  backend:
    driver: overlay
    internal: true

# ══════════════════════════════════════════════════════════════════════════
# SECRETS (must be created manually before deploy — see setup commands above)
# ══════════════════════════════════════════════════════════════════════════
secrets:
  postgres_user:
    external: true
  postgres_password:
    external: true
  mongo_user:
    external: true
  mongo_password:
    external: true

# ══════════════════════════════════════════════════════════════════════════
# CONFIGS — distributed to containers via Swarm (immutable, content-addressed)
# ══════════════════════════════════════════════════════════════════════════
configs:
  postgres_init_db:
    file: ./scripts/init-db.sql
