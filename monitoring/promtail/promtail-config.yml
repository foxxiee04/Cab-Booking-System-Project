server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  # Persistent path (mounted as a named volume in both compose and Swarm).
  # /tmp is ephemeral — on restart promtail would re-read all logs and flood Loki.
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
    relabel_configs:
      # Extract container name as service label
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: service
      # Extract Docker Swarm service name if available
      - source_labels: [__meta_docker_container_label_com_docker_swarm_service_name]
        target_label: swarm_service
      # Set log path
      - source_labels: [__meta_docker_container_id]
        target_label: __path__
        replacement: /var/lib/docker/containers/$1/$1-json.log
      # Keep container image as label
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service
    pipeline_stages:
      # Parse JSON log format from Docker
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      # Extract the actual log message
      - output:
          source: log
      # Add timestamp from Docker log
      - timestamp:
          source: time
          format: RFC3339Nano
