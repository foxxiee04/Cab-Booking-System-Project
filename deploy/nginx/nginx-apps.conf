# Nginx configuration — Cab Booking System (foxgo.online)
#
# File này được dùng làm THAM KHẢO.
# Config thực tế trên server nằm tại: /etc/nginx/conf.d/foxgo.conf
# (được Certbot cập nhật tự động để thêm SSL)
#
# Domains:
#   https://foxgo.online          → Customer App
#   https://driver.foxgo.online   → Driver App
#   https://admin.foxgo.online    → Admin Dashboard
#   https://api.foxgo.online      → API Gateway (:3000)
#
# Build directories trên server:
#   /home/ubuntu/customer-build/
#   /home/ubuntu/driver-build/
#   /home/ubuntu/admin-build/

# ── Customer App ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name foxgo.online www.foxgo.online;
    root /home/ubuntu/customer-build;
    index index.html;

    # React Router — tất cả routes trả về index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── Driver App ────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name driver.foxgo.online;
    root /home/ubuntu/driver-build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── Admin Dashboard ───────────────────────────────────────────────────────────
server {
    listen 80;
    server_name admin.foxgo.online;
    root /home/ubuntu/admin-build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── API Gateway (reverse proxy) ───────────────────────────────────────────────
server {
    listen 80;
    server_name api.foxgo.online;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        # WebSocket support (Socket.IO)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Forward real client IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeout cho long-polling / WebSocket
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
