# Nginx configuration — FoxGo (foxgo.io.vn)
#
# Domains:
#   https://foxgo.io.vn          → Customer App
#   https://driver.foxgo.io.vn   → Driver App
#   https://admin.foxgo.io.vn    → Admin Dashboard
#   https://api.foxgo.io.vn      → API Gateway (:3000)
#
# Build directories trên server:
#   /home/ubuntu/customer-build/
#   /home/ubuntu/driver-build/
#   /home/ubuntu/admin-build/

# ── Customer App ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name foxgo.io.vn www.foxgo.io.vn;
    root /home/ubuntu/customer-build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── Driver App ────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name driver.foxgo.io.vn;
    root /home/ubuntu/driver-build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── Admin Dashboard ───────────────────────────────────────────────────────────
server {
    listen 80;
    server_name admin.foxgo.io.vn;
    root /home/ubuntu/admin-build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── API Gateway (reverse proxy + WebSocket) ───────────────────────────────────
server {
    listen 80;
    server_name api.foxgo.io.vn;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        # WebSocket support (Socket.IO)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
