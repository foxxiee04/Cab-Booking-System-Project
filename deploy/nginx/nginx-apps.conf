# Nginx config for front-end SPA applications.
# Adjust the `root` path to match the deployed build directory on the host.

server {
    listen 4000;
    server_name _;
    root /home/ubuntu/customer-build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 4001;
    server_name _;
    root /home/ubuntu/driver-build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 4002;
    server_name _;
    root /home/ubuntu/admin-build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
